name: CI

on:
  pull_request:
  push:
    branches: [main, development]

jobs:
  phpcs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pediment
    steps:
      - uses: actions/checkout@v4
        with:
          path: pediment
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer
      - run: composer install --prefer-dist --no-progress
      - run: composer lint

  lint-blocks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pediment
    steps:
      - uses: actions/checkout@v4
        with:
          path: pediment
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: pediment/package-lock.json
      - run: npm ci
      - run: npm run lint:blocks
      - run: npm run lint:colors
      - run: npm run lint:icons
      - run: npm run lint:js

  phpunit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pediment
    steps:
      - uses: actions/checkout@v4
        with:
          path: pediment
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: pediment/package-lock.json
      - run: composer install --prefer-dist --no-progress
      - run: npm ci
      - run: npm run env:start
      - run: npm run build
      - run: npx wp-env run tests-wordpress --env-cwd=wp-content/themes/pediment vendor/bin/phpunit
      - if: always()
        run: npm run env:stop

  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pediment
    steps:
      - uses: actions/checkout@v4
        with:
          path: pediment
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: pediment/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run env:start
      - run: npm run build
      - run: npx wp-env run cli wp theme activate pediment
      - run: npx wp-env run cli wp rewrite structure "/%postname%/"
      - run: npx wp-env run cli wp rewrite flush --hard
      - run: npm run e2e
      - if: always()
        run: npm run env:stop
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: pediment/playwright-report/
