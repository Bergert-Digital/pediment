"$schema" = "https://conductor.build/schemas/settings.repo.schema.json"

[scripts]
# Prepare a freshly created workspace: PHP deps, JS deps, and a one-shot block build.
setup = "composer install && npm install && npm run build"

# Boot the wp-env Docker stack on this workspace's port range, then watch + rebuild blocks.
# WP_ENV_PORT / WP_ENV_TESTS_PORT keep each workspace's WordPress + tests containers on
# distinct ports so multiple workspaces can run side by side.
run = "WP_ENV_PORT=$CONDUCTOR_PORT WP_ENV_TESTS_PORT=$((CONDUCTOR_PORT + 1)) npm run env:start && npm run start"

# Tear down the workspace's Docker containers when archiving to free ports and resources.
archive = "npm run env:stop || true"

# wp-env containers are isolated per worktree path and ports are parameterized above,
# so multiple workspaces can run concurrently (mind total Docker resource usage).
run_mode = "concurrent"
